<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">

<h2>Admin</h2>

<input id="token" placeholder="Digite o token">
<button onclick="login()">Entrar</button>

<div id="painel" style="display:none">
  <h3>Equipes</h3>
  <button onclick="carregar()">Atualizar</button>
  <div id="lista"></div>
</div>

<script>
function login() {
  const token = document.getElementById("token").value;
  localStorage.setItem("adminToken", token);
  document.getElementById("painel").style.display = "block";
  carregar();
}

function headers() {
  return {
    "Content-Type": "application/json",
    "x-admin-token": localStorage.getItem("adminToken")
  };
}

async function carregar() {
  const res = await fetch("/api/admin/registrations", {
    headers: headers()
  });

  const data = await res.json();

  if (!data.success) {
    alert(data.message);
    return;
  }

  document.getElementById("lista").innerHTML =
    data.teams.map(t => `
      <div style="margin:10px;border:1px solid #555;padding:10px">
        <b>${t.team_name}</b><br>
        ${t.player_one} / ${t.player_two}<br>
        Status: ${t.status}<br><br>
        <button onclick="aprovar('${t.id}')">Aprovar</button>
      </div>
    `).join("");
}

async function aprovar(id) {
  await fetch("/api/admin/update-status", {
    method: "POST",
    headers: headers(),
    body: JSON.stringify({ id, status: "approved" })
  });

  carregar();
}
</script>

</body>
</html>
