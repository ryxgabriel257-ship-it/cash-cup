<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin • Cash Cup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #fff;
      padding: 24px;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }

    h1, h2 {
      color: #00ff88;
      margin-bottom: 14px;
    }

    .muted {
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.12);
      background: #111;
      color: #fff;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .primary { background: #00ff88; color: #000; }
    .secondary { background: #2b2b2b; color: #fff; }
    .danger { background: #ff5a5a; color: #fff; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 16px;
    }

    .stat-box strong {
      display: block;
      color: #00ff88;
      font-size: 22px;
      margin-top: 6px;
    }

    .msg {
      display: none;
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
    }

    .msg.show { display: block; }

    .ok {
      background: rgba(0,255,136,.08);
      border: 1px solid rgba(0,255,136,.22);
      color: #9fffd0;
    }

    .err {
      background: rgba(255,90,90,.08);
      border: 1px solid rgba(255,90,90,.22);
      color: #ffbaba;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,.08);
      text-align: left;
      vertical-align: top;
    }

    .status {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .pending  { background: rgba(255,210,90,.12); color: #ffe69a; }
    .approved { background: rgba(0,255,136,.12); color: #9fffd0; }
    .rejected { background: rgba(255,90,90,.12); color: #ffbaba; }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    @media (max-width: 900px) {
      .grid, .stats {
        grid-template-columns: 1fr;
      }

      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead { display: none; }

      tr {
        padding: 14px 0;
        border-bottom: 1px solid rgba(255,255,255,.08);
      }

      td { padding: 8px 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h1>Painel Admin • Cash Cup</h1>
      <p class="muted">Entre com seu usuário e senha para gerenciar as equipes.</p>

      <div class="grid">
        <input id="user" placeholder="Usuário">
        <input id="pass" type="password" placeholder="Senha">
      </div>

      <div style="margin-top:16px;">
        <button class="primary" onclick="login()">Entrar</button>
      </div>

      <div class="msg" id="loginMsg"></div>
    </div>

    <div id="panelCard" style="display:none;">
      <div class="toolbar">
        <div>
          <h2>Painel de equipes</h2>
          <p class="muted">Aprove, recuse ou volte equipes para pendente.</p>
        </div>
        <div>
          <button class="secondary" onclick="loadTeams()">Atualizar</button>
          <button class="secondary" onclick="logout()">Sair</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat-box">
          Total de equipes
          <strong id="statTotal">0</strong>
        </div>
        <div class="stat-box">
          Aprovadas
          <strong id="statApproved">0</strong>
        </div>
        <div class="stat-box">
          Vagas restantes
          <strong id="statRemaining">0</strong>
        </div>
      </div>

      <div class="msg" id="panelMsg"></div>

      <div class="card">
        <div style="overflow:auto;">
          <table>
            <thead>
              <tr>
                <th>Equipe</th>
                <th>Status</th>
                <th>Discord</th>
                <th>Celular</th>
                <th>Dupla</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    function el(id) {
      return document.getElementById(id);
    }

    function adminHeaders() {
      return {
        "Content-Type": "application/json",
        "x-admin-user": localStorage.getItem("adminUser") || "",
        "x-admin-pass": localStorage.getItem("adminPass") || ""
      };
    }

    function showMsg(id, text, type) {
      const box = el(id);
      box.textContent = text;
      box.className = `msg show ${type}`;
    }

    function clearMsg(id) {
      const box = el(id);
      box.textContent = "";
      box.className = "msg";
    }

    function badge(status) {
      const cls =
        status === "approved" ? "approved" :
        status === "rejected" ? "rejected" :
        "pending";

      const txt =
        status === "approved" ? "Aprovada" :
        status === "rejected" ? "Recusada" :
        "Pendente";

      return `<span class="status ${cls}">${txt}</span>`;
    }

    async function login() {
      clearMsg("loginMsg");

      const user = el("user").value.trim();
      const pass = el("pass").value.trim();

      if (!user || !pass) {
        showMsg("loginMsg", "Preencha usuário e senha.", "err");
        return;
      }

      try {
        const res = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ user, pass })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMsg("loginMsg", data.message || "Usuário ou senha inválidos.", "err");
          return;
        }

        localStorage.setItem("adminUser", user);
        localStorage.setItem("adminPass", pass);

        el("loginCard").style.display = "none";
        el("panelCard").style.display = "block";

        loadTeams();
      } catch (err) {
        showMsg("loginMsg", "Erro ao conectar com o servidor.", "err");
      }
    }

    function logout() {
      localStorage.removeItem("adminUser");
      localStorage.removeItem("adminPass");
      location.reload();
    }

    async function loadTeams() {
      clearMsg("panelMsg");

      try {
        const res = await fetch("/api/admin/registrations", {
          method: "GET",
          headers: adminHeaders()
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMsg("panelMsg", data.message || "Erro ao carregar equipes.", "err");
          return;
        }

        const teams = Array.isArray(data.teams) ? data.teams : [];

        el("statTotal").textContent = teams.length;
        el("statApproved").textContent = data.approvedTeams ?? 0;
        el("statRemaining").textContent = data.remainingSlots ?? 0;

        if (teams.length === 0) {
          el("rows").innerHTML = `<tr><td colspan="6">Nenhuma equipe registrada ainda.</td></tr>`;
          return;
        }

        el("rows").innerHTML = teams.map(team => `
          <tr>
            <td>
              <b>${team.team_name || "-"}</b><br>
              <small>${team.created_at ? new Date(team.created_at).toLocaleString("pt-BR") : "-"}</small>
            </td>
            <td>${badge(team.status)}</td>
            <td>${team.discord || "-"}</td>
            <td>${team.phone || "-"}</td>
            <td>${team.player_one || "-"}<br>${team.player_two || "-"}</td>
            <td>
              <div class="actions">
                <button class="primary" onclick="updateStatus('${team.id}', 'approved')">Aprovar</button>
                <button class="secondary" onclick="updateStatus('${team.id}', 'pending')">Pendente</button>
                <button class="danger" onclick="updateStatus('${team.id}', 'rejected')">Recusar</button>
              </div>
            </td>
          </tr>
        `).join("");
      } catch (err) {
        showMsg("panelMsg", "Erro ao carregar equipes.", "err");
      }
    }

    async function updateStatus(id, status) {
      clearMsg("panelMsg");

      try {
        const res = await fetch("/api/admin/update-status", {
          method: "POST",
          headers: adminHeaders(),
          body: JSON.stringify({ id, status })
        });

        const data = await res.json();

        if (!res.ok || !data.success) {
          showMsg("panelMsg", data.message || "Erro ao atualizar equipe.", "err");
          return;
        }

        showMsg("panelMsg", data.message || "Status atualizado com sucesso.", "ok");
        loadTeams();
      } catch (err) {
        showMsg("panelMsg", "Erro ao atualizar equipe.", "err");
      }
    }

    if (localStorage.getItem("adminUser") && localStorage.getItem("adminPass")) {
      el("loginCard").style.display = "none";
      el("panelCard").style.display = "block";
      loadTeams();
    }
  </script>
</body>
</html>
